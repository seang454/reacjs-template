name: SonarQube Analysis

on:
  workflow_call:
    secrets:
      SONAR_API_TOKEN:        # ← ONE TOKEN for everything
        required: true
      SONAR_HOST_URL:
        required: true

jobs:
  sonar-job:
    runs-on: ubuntu-latest
    environment: SONAR_ENV
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      # ✅ Check if project exists, if not create it
      - name: Create SonarQube Project if not exists
        run: |
          PROJECT_KEY="${GITHUB_REPOSITORY##*/}"
          echo "Checking project: $PROJECT_KEY"

          # ✅ First test connection
          echo "Testing connection to SonarQube..."
          RESPONSE=$(curl -s \
            -u "${{ secrets.SONAR_API_TOKEN }}:" \
            "${{ secrets.SONAR_HOST_URL }}/api/projects/search?projects=$PROJECT_KEY")

          echo "Response: $RESPONSE"

          # ✅ Fix grep exit code issue
          EXISTS=$(echo "$RESPONSE" | grep -c "\"key\":\"$PROJECT_KEY\"" || true)

          echo "Project exists count: $EXISTS"

          if [ "$EXISTS" -eq "0" ]; then
            echo "Project not found! Creating: $PROJECT_KEY"
            CREATE_RESPONSE=$(curl -s -X POST \
              -u "${{ secrets.SONAR_API_TOKEN }}:" \
              "${{ secrets.SONAR_HOST_URL }}/api/projects/create" \
              -d "name=$PROJECT_KEY&project=$PROJECT_KEY&mainBranch=master")
            echo "Create response: $CREATE_RESPONSE"
            echo "Project created ✅"
          else
            echo "Project already exists ✅"
          fi

      # ✅ Create sonar-project.properties dynamically
      - name: Create sonar-project.properties
        run: |
          PROJECT_KEY="${GITHUB_REPOSITORY##*/}"
          echo "sonar.projectKey=$PROJECT_KEY" > sonar-project.properties
          echo "sonar.projectName=$PROJECT_KEY" >> sonar-project.properties
          echo "sonar.sources=." >> sonar-project.properties
          cat sonar-project.properties

      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@master
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_API_TOKEN }}      # ← same token
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}

      - name: SonarQube Quality Gate
        uses: SonarSource/sonarqube-quality-gate-action@master
        timeout-minutes: 5
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_API_TOKEN }}      # ← same token
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}