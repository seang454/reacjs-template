name: Cloudflare DNS Setup

on:
  workflow_call:
    secrets:
      CF_API_TOKEN:
        required: true
      CF_ZONE_ID:
        required: true
      SERVER_IP:
        required: true
    inputs:
      domain:
        required: true
        type: string
        description: "Base domain e.g. seang.shop"
      # ✅ ADD THIS - receive subdomain from caller
      subdomain:
        required: false
        type: string
        description: "Subdomain e.g. reactjs-itp-gen1"

jobs:
  dns-job:
    runs-on: ubuntu-latest
    environment: DNS_ENV
    steps:
      - name: Create Cloudflare DNS if not exists
        env:
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CF_ZONE_ID: ${{ secrets.CF_ZONE_ID }}
          SERVER_IP: ${{ secrets.SERVER_IP }}
        run: |
          # ✅ Use input if provided, otherwise get from repo name
          if [ -n "${{ inputs.subdomain }}" ]; then
            SUBDOMAIN="${{ inputs.subdomain }}"
          else
            SUBDOMAIN="${GITHUB_REPOSITORY##*/}"
          fi

          DOMAIN="${{ inputs.domain }}"
          FULL_DOMAIN="$SUBDOMAIN.$DOMAIN"

          echo "SUBDOMAIN   = $SUBDOMAIN"
          echo "FULL_DOMAIN = $FULL_DOMAIN"
          echo "Checking DNS for: $FULL_DOMAIN"

          RESPONSE=$(curl -s -X GET \
            "https://api.cloudflare.com/client/v4/zones/$CF_ZONE_ID/dns_records?type=A&name=$FULL_DOMAIN" \
            -H "Authorization: Bearer $CF_API_TOKEN" \
            -H "Content-Type: application/json")

          echo "Response: $RESPONSE"

          EXISTS=$(echo "$RESPONSE" | grep -c "\"name\":\"$FULL_DOMAIN\"" || true)
          echo "Exists count: $EXISTS"

          if [ "$EXISTS" -eq "0" ]; then
            echo "Creating DNS: $FULL_DOMAIN → $SERVER_IP"

            CREATE_RESPONSE=$(curl -s -X POST \
              "https://api.cloudflare.com/client/v4/zones/$CF_ZONE_ID/dns_records" \
              -H "Authorization: Bearer $CF_API_TOKEN" \
              -H "Content-Type: application/json" \
              --data "{
                \"type\": \"A\",
                \"name\": \"$SUBDOMAIN\",
                \"content\": \"$SERVER_IP\",
                \"ttl\": 1,
                \"proxied\": true
              }")

            echo "Create response: $CREATE_RESPONSE"

            SUCCESS=$(echo "$CREATE_RESPONSE" | grep -c "\"success\":true" || true)
            if [ "$SUCCESS" -eq "0" ]; then
              echo "❌ Failed to create DNS!"
              exit 1
            fi
            echo "DNS created ✅: $FULL_DOMAIN → $SERVER_IP"
          else
            echo "DNS already exists ✅ Skipping..."
          fi

      - name: Verify DNS Record
        env:
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CF_ZONE_ID: ${{ secrets.CF_ZONE_ID }}
        run: |
          if [ -n "${{ inputs.subdomain }}" ]; then
            SUBDOMAIN="${{ inputs.subdomain }}"
          else
            SUBDOMAIN="${GITHUB_REPOSITORY##*/}"
          fi

          FULL_DOMAIN="$SUBDOMAIN.${{ inputs.domain }}"
          echo "Verifying DNS for: $FULL_DOMAIN"

          MAX_RETRIES=5
          COUNT=0
          FOUND=0

          while [ $COUNT -lt $MAX_RETRIES ]; do
            VERIFY=$(curl -s -X GET \
              "https://api.cloudflare.com/client/v4/zones/$CF_ZONE_ID/dns_records?type=A&name=$FULL_DOMAIN" \
              -H "Authorization: Bearer $CF_API_TOKEN" \
              -H "Content-Type: application/json")

            FOUND=$(echo "$VERIFY" | grep -c "\"name\":\"$FULL_DOMAIN\"" || true)

            if [ "$FOUND" -gt "0" ]; then
              echo "✅ DNS verified: $FULL_DOMAIN is active!"
              break
            fi

            COUNT=$((COUNT + 1))
            echo "Retry $COUNT/$MAX_RETRIES - waiting 10 seconds..."
            sleep 10
          done

          if [ "$FOUND" -eq "0" ]; then
            echo "❌ DNS verification failed!"
            exit 1
          fi